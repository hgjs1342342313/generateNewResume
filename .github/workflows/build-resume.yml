name: 编译简历 PDF

on:
  push:
    paths:
      - 'pending/*.json'
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      resume_json:
        description: '简历 JSON 数据（可选，留空则使用 pending/ 目录下的最新文件）'
        required: false
        default: ''

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-lang-chinese texlive-fonts-recommended texlive-fonts-extra fonts-wqy-microhei
          # 安装 fontawesome 包
          sudo apt-get install -y texlive-fonts-extra

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 查找待处理的简历文件
        id: find-resume
        run: |
          if [ -n "${{ github.event.inputs.resume_json }}" ]; then
            echo '${{ github.event.inputs.resume_json }}' > /tmp/resume_input.json
            echo "resume_file=/tmp/resume_input.json" >> $GITHUB_OUTPUT
          else
            # 只查找本次 push 新增的文件
            # 使用 git diff 获取新增的 pending/*.json 文件
            NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'pending/*.json' 2>/dev/null || echo "")
            if [ -z "$NEW_FILES" ]; then
              # 如果没有新增文件，fallback 到最新的
              LATEST=$(ls -t pending/*.json 2>/dev/null | head -n1)
              if [ -z "$LATEST" ]; then
                echo "❌ 未找到待处理的简历文件"
                exit 1
              fi
              echo "resume_file=$LATEST" >> $GITHUB_OUTPUT
            else
              # 取新增文件中的第一个（按时间排序）
              NEWEST=$(echo "$NEW_FILES" | xargs ls -t 2>/dev/null | head -n1)
              echo "resume_file=$NEWEST" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 生成 LaTeX 文件
        id: generate
        run: |
          RESUME_FILE="${{ steps.find-resume.outputs.resume_file }}"
          echo "📄 处理文件: $RESUME_FILE"
          
          NAME=$(python3 -c "import json; print(json.load(open('$RESUME_FILE'))['personal']['name'])" 2>/dev/null || echo "resume")
          SAFE_NAME=$(echo "$NAME" | sed 's/[^a-zA-Z0-9\u4e00-\u9fa5]/_/g')
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          OUTPUT_NAME="resume_${SAFE_NAME}_${TIMESTAMP}"
          echo "output_name=$OUTPUT_NAME" >> $GITHUB_OUTPUT
          
          python3 scripts/generate_resume.py "$RESUME_FILE" --output-dir output --template-dir resume
          mv output/*.tex output/${OUTPUT_NAME}.tex
          
          echo "✅ LaTeX 文件已生成: output/${OUTPUT_NAME}.tex"

      - name: 编译 LaTeX 为 PDF
        id: compile
        run: |
          OUTPUT_NAME="${{ steps.generate.outputs.output_name }}"
          cd output
          cp -r ../resume/* .
          
          echo "🔨 第一次编译..."
          xelatex -interaction=nonstopmode ${OUTPUT_NAME}.tex || true
          
          echo "🔨 第二次编译..."
          xelatex -interaction=nonstopmode ${OUTPUT_NAME}.tex
          
          if [ ! -f "${OUTPUT_NAME}.pdf" ]; then
            echo "❌ PDF 生成失败"
            cat ${OUTPUT_NAME}.log
            exit 1
          fi
          
          echo "✅ PDF 生成成功: ${OUTPUT_NAME}.pdf"

      - name: 上传 PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: output/*.pdf
          retention-days: 30

      - name: 发送邮件
        id: send-email
        env:
          SMTP_SERVER: smtp.qq.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          OUTPUT_NAME="${{ steps.generate.outputs.output_name }}"
          RESUME_FILE="${{ steps.find-resume.outputs.resume_file }}"
          
          TARGET_EMAIL=$(python3 -c "import json; print(json.load(open('$RESUME_FILE')).get('target_email', ''))" 2>/dev/null || echo "")
          NAME=$(python3 -c "import json; print(json.load(open('$RESUME_FILE'))['personal']['name'])" 2>/dev/null || echo "用户")
          
          if [ -z "$TARGET_EMAIL" ]; then
            echo "⚠️ 未提供目标邮箱，跳过邮件发送"
            echo "email_sent=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📧 发送简历到: $TARGET_EMAIL"
          
          export OUTPUT_NAME="$OUTPUT_NAME"
          export TARGET_EMAIL="$TARGET_EMAIL"
          export NAME="$NAME"
          export RESUME_FILE="$RESUME_FILE"
          
          python3 -c "
          import smtplib, os, json
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from email.mime.application import MIMEApplication
          from email.utils import formataddr

          smtp_server = os.environ['SMTP_SERVER']
          smtp_port = int(os.environ['SMTP_PORT'])
          smtp_user = os.environ['SMTP_USER']
          smtp_pass = os.environ['SMTP_PASS']

          output_name = os.environ['OUTPUT_NAME']
          target_email = os.environ['TARGET_EMAIL']
          name = os.environ['NAME']
          resume_file = os.environ['RESUME_FILE']

          # 读取简历数据，生成纯文本正文
          with open(resume_file, 'r', encoding='utf-8') as f:
              data = json.load(f)

          lines = [f'您好 {name}！', '', '您的简历已成功生成，PDF 文件见附件。', '', '=' * 40, '📋 简历内容（方便复制到网申系统）', '=' * 40, '']

          # 个人信息
          personal = data.get('personal', {})
          lines.append('【基本信息】')
          lines.append(f'姓名：{personal.get(\"name\", \"\")}')
          lines.append(f'邮箱：{personal.get(\"email\", \"\")}')
          lines.append(f'电话：{personal.get(\"phone\", \"\")}')
          lines.append('')

          # 教育背景
          for edu in data.get('education', []):
              lines.append('【教育背景】')
              lines.append(f'学校：{edu.get(\"school\", \"\")}')
              lines.append(f'地点：{edu.get(\"location\", \"\")}')
              lines.append(f'时间：{edu.get(\"period\", \"\")}')
              lines.append(f'学位：{edu.get(\"degree\", \"\")}')
              lines.append(f'专业：{edu.get(\"major\", \"\")}')
              lines.append('')

          # 工作经历 或 过往经历
          options = data.get('options', {})
          if options.get('hasWorkExperience'):
              for exp in data.get('experience', []):
                  lines.append('【工作经历】')
                  lines.append(f'公司：{exp.get(\"company\", \"\")}')
                  lines.append(f'部门：{exp.get(\"department\", \"\")}')
                  lines.append(f'时间：{exp.get(\"period\", \"\")}')
                  lines.append(f'职位：{exp.get(\"role\", \"\")}')
                  if exp.get('responsibilities'):
                      lines.append(f'核心职责：{exp[\"responsibilities\"]}')
                  for group in exp.get('project_groups', []):
                      lines.append(f'  项目组：{group.get(\"group_title\", \"\")}')
                      for proj in group.get('projects', []):
                          lines.append(f'    项目：{proj.get(\"title\", \"\")}')
                          if proj.get('challenge'):
                              lines.append(f'    挑战：{proj[\"challenge\"]}')
                          for ach in proj.get('achievements', []):
                              lines.append(f'    · {ach}')
                  for proj in exp.get('projects', []):
                      lines.append(f'  项目：{proj.get(\"title\", \"\")}')
                      if proj.get('challenge'):
                          lines.append(f'  挑战：{proj[\"challenge\"]}')
                      for ach in proj.get('achievements', []):
                          lines.append(f'  · {ach}')
                  lines.append('')
          else:
              for pe in data.get('past_experience', []):
                  lines.append('【过往经历】')
                  lines.append(f'名称：{pe.get(\"name\", \"\")}')
                  lines.append(f'时间：{pe.get(\"period\", \"\")}')
                  lines.append(f'角色：{pe.get(\"role\", \"\")}')
                  lines.append(f'技术栈：{pe.get(\"tech\", \"\")}')
                  if pe.get('description'):
                      lines.append(f'描述：{pe[\"description\"]}')
                  if pe.get('achievements'):
                      for ach in pe['achievements'].split('\n'):
                          ach = ach.strip()
                          if ach:
                              lines.append(f'· {ach}')
                  lines.append('')

          # 技能
          skills = data.get('skills', [])
          if skills:
              lines.append('【技能】')
              for skill in skills:
                  lines.append(f'· {skill}')
              lines.append('')

          lines.append('=' * 40)
          lines.append('祝好！')
          lines.append('简历生成器')

          body = '\n'.join(lines)

          msg = MIMEMultipart()
          msg['From'] = formataddr(('简历生成器', smtp_user))
          msg['To'] = target_email
          msg['Subject'] = f'您的简历已生成 - {name}'
          msg.attach(MIMEText(body, 'plain', 'utf-8'))

          pdf_path = f'output/{output_name}.pdf'
          with open(pdf_path, 'rb') as f:
              pdf = MIMEApplication(f.read(), _subtype='pdf')
              pdf.add_header('Content-Disposition', 'attachment', filename=f'{output_name}.pdf')
              msg.attach(pdf)

          with smtplib.SMTP(smtp_server, smtp_port) as server:
              server.starttls()
              server.login(smtp_user, smtp_pass)
              server.sendmail(smtp_user, [target_email], msg.as_string())

          print(f'✅ 邮件已发送到: {target_email}')
          "
          
          echo "email_sent=true" >> $GITHUB_OUTPUT
          echo "target_email=$TARGET_EMAIL" >> $GITHUB_OUTPUT

      - name: 清理已处理的文件
        if: github.event.inputs.resume_json == ''
        run: |
          RESUME_FILE="${{ steps.find-resume.outputs.resume_file }}"
          if [ -f "$RESUME_FILE" ]; then
            rm "$RESUME_FILE"
            echo "✅ 已删除处理文件: $RESUME_FILE"
          fi

      - name: 提交处理结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: 清理已处理的简历文件"
          git push || true

      - name: 生成摘要
        run: |
          OUTPUT_NAME="${{ steps.generate.outputs.output_name }}"
          EMAIL_SENT="${{ steps.send-email.outputs.email_sent }}"
          TARGET_EMAIL="${{ steps.send-email.outputs.target_email }}"
          
          echo "## 📄 简历编译完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **输出文件**: \`${OUTPUT_NAME}.pdf\`" >> $GITHUB_STEP_SUMMARY
          
          if [ "$EMAIL_SENT" = "true" ]; then
            echo "- **邮件已发送**: ${TARGET_EMAIL}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ 简历 PDF 已发送到您的邮箱，请查收！" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **下载方式**: 在 Actions 页面下载 \`resume-pdf\` artifact" >> $GITHUB_STEP_SUMMARY
          fi